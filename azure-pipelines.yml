trigger:
  - main

pr:
  - main

variables:
  dockerRegistryServiceConnection: 'capecoRegistry'
  imageRepository: 'capeco-api'
  containerRegistry: 'capecoregistry.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  imageTag: '$(containerRegistry)/$(imageRepository):$(tag)'
  latestTag: '$(containerRegistry)/$(imageRepository):latest'

stages:
  - stage: Build
    displayName: Build and Push Docker Image
    jobs:
      - job: BuildDockerImage
        displayName: 'Build and Push'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: 'build'
              Dockerfile: $(dockerfilePath)
              tags: |
                $(imageTag)
                $(latestTag)
              arguments: '--build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')'

          - task: Docker@2
            displayName: 'Push Image to Registry'
            inputs:
              command: 'push'
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepository)
              tags: |
                $(tag)
                latest

  - stage: Test
    displayName: Test Deployment
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: TestDeploy
        displayName: 'Deploy to Test Environment'
        environment: 'test'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy to Web App (Test)'
                  inputs:
                    azureSubscription: 'Azure Subscription'
                    appName: 'capeco-app-test'
                    imageName: $(imageTag)

                - task: UsePythonVersion@0
                  displayName: 'Set Python Version'
                  inputs:
                    versionSpec: '3.10'

                - script: |
                    pip install requests
                    python -c "
                    import requests
                    import time
                    time.sleep(10)
                    response = requests.get('https://capeco-app-test.azurewebsites.net/health', timeout=10)
                    assert response.status_code == 200, f'Expected 200, got {response.status_code}'
                    data = response.json()
                    assert data['status'] == 'healthy', f'Expected healthy, got {data.get(\"status\")}'
                    print('Health check passed!')
                    "
                  displayName: 'Verify Health Check'
                  continueOnError: true

  - stage: Deploy
    displayName: Deploy to Production
    dependsOn: Test
    condition: succeeded()
    jobs:
      - deployment: ProdDeploy
        displayName: 'Deploy to Production'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy to Web App (Production)'
                  inputs:
                    azureSubscription: 'Azure Subscription'
                    appName: 'capeco-app'
                    imageName: $(latestTag)

                - task: AzureAppServiceManage@0
                  displayName: 'Start App Service'
                  inputs:
                    azureSubscription: 'Azure Subscription'
                    Action: 'Start Azure App Service'
                    WebAppName: 'capeco-app'

                - script: |
                    echo "Deployment to production completed"
                    echo "API available at: https://capeco-app.azurewebsites.net"
                    echo "Health check: https://capeco-app.azurewebsites.net/health"
                  displayName: 'Print Deployment Info'
