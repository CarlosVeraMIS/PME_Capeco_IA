<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Inmobiliario Lima 2026</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar / Header -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🏢</span>
                <h1>Capeco <span>Lima 2026</span></h1>
            </div>
            <div class="stats-overview">
                <div class="stat-card">
                    <span class="stat-value" id="total-projects">0</span>
                    <span class="stat-label">Proyectos</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="total-units">0</span>
                    <span class="stat-label">Unidades</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="avg-price">S/ 0</span>
                    <span class="stat-label">Precio Prom.</span>
                </div>
            </div>
        </header>

        <main class="app-content">
            <!-- Map and Table Sections -->
            <section class="visuals-grid">
                <div class="map-wrapper card glass">
                    <div id="map"></div>
                </div>
                <div class="data-panel card glass">
                    <div class="panel-header">
                        <h2>Oferta por Distrito</h2>
                        <div class="panel-actions">
                            <input type="text" id="search-input" placeholder="Buscar distrito...">
                        </div>
                    </div>
                    <div class="table-container">
                        <table id="districts-table">
                            <thead>
                                <tr>
                                    <th>Distrito</th>
                                    <th>Proy.</th>
                                    <th>Unidades</th>
                                    <th>Precio</th>
                                    <th>Área (m²)</th>
                                    <th>S/ x m²</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Secondary Charts Section -->
            <section class="charts-section">
                <div class="chart-wrapper card glass">
                    <h3>Top 10 Distritos por Unidades</h3>
                    <canvas id="unitsChart"></canvas>
                </div>
                <div class="chart-wrapper card glass">
                    <h3>Precio m² por Distrito</h3>
                    <canvas id="priceChart"></canvas>
                </div>
            </section>
        </main>
        
        <footer class="app-footer">
            <p>&copy; 2026 Analítica Inmobiliaria - Capeco Lima</p>
        </footer>
    </div>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
