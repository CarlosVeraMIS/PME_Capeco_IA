
<style>
:root { --gap: 10px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

.board { padding: 1rem 0; }
.topbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
.topbar h1 { font-size: 17px; font-weight: 500; color: var(--color-text-primary); }
.topbar p { font-size: 12px; color: var(--color-text-secondary); }
.stats { display: flex; gap: 8px; flex-wrap: wrap; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; text-align: center; }
.stat .n { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.stat .l { font-size: 11px; color: var(--color-text-secondary); }

.filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.2rem; }
.chip { border: 0.5px solid var(--color-border-secondary); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; background: transparent; color: var(--color-text-secondary); transition: all 0.15s; }
.chip.active { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); font-weight: 500; }

.section { margin-bottom: 1.5rem; }
.section-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.section-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.section-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.section-count { font-size: 11px; color: var(--color-text-secondary); margin-left: auto; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: var(--gap); }

.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 12px 14px; cursor: pointer; transition: border-color 0.15s; }
.card:hover { border-color: var(--color-border-secondary); }
.card.hidden { display: none; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 8px; }
.card-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; }
.prio { font-size: 10px; border-radius: 4px; padding: 2px 7px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
.prio-1 { background: #FCEBEB; color: #A32D2D; }
.prio-2 { background: #FAEEDA; color: #854F0B; }
.prio-3 { background: #EAF3DE; color: #3B6D11; }

.card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.tag { font-size: 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; padding: 2px 6px; color: var(--color-text-secondary); }
.day-badge { font-size: 10px; color: var(--color-text-tertiary); margin-left: auto; }

.card-desc { font-size: 11px; color: var(--color-text-secondary); margin: 6px 0 0; line-height: 1.5; display: none; }
.card.expanded .card-desc { display: block; }
.card.expanded { border-color: var(--color-border-primary); }

.progress-bar { height: 3px; background: var(--color-border-tertiary); border-radius: 2px; margin-top: 10px; }
.progress-fill { height: 3px; border-radius: 2px; transition: width 0.3s; }

.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1rem; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>

<div class="board">
  <div class="topbar">

    <div class="stats">
      <div class="stat"><div class="n">31</div><div class="l">materiales</div></div>
      <div class="stat"><div class="n">12</div><div class="l">prioridad 1</div></div>
      <div class="stat"><div class="n">4</div><div class="l">semanas</div></div>

    <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div>Prioridad 3 — mes 2</div>

  <div class="filters">

    <button class="chip" onclick="filter('av')">Audiovisual (5)</button>
  </div>

  <div id="sections-container"></div>
</div>

function filter(cat) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.card').forEach(card => {
    if (cat === 'all' || card.dataset.cat === cat) card.classList.remove('hidden');
    else card.classList.add('hidden');
  });
  document.querySelectorAll('.section').forEach(sec => {
    const visible = sec.querySelectorAll('.card:not(.hidden)').length;
    sec.style.display = visible === 0 ? 'none' : '';
  });
}

function toggleCard(card) {
  card.classList.toggle('expanded');
}

const container = document.getElementById('sections-container');
data.forEach(section => {
  const sec = document.createElement('div');
  sec.className = 'section';
  const p1 = section.items.filter(i => i.prio === 1).length;
  sec.innerHTML = `<div class="section-head"><div class="section-dot" style="background:${section.color}"></div><span class="section-title">${section.catLabel}</span><span class="section-count">${section.items.length} piezas · ${p1} urgentes</span></div><div class="grid" id="grid-${section.cat}"></div>`;
  container.appendChild(sec);
  const grid = sec.querySelector('.grid');
  section.items.forEach(item => {
    const prioLabel = item.prio === 1 ? 'Urgente' : item.prio === 2 ? 'Semana 2–3' : 'Mes 2';
    const prioClass = `prio-${item.prio}`;
    const progW = item.prio === 1 ? 0 : item.prio === 2 ? 0 : 0;
    const progColor = item.prio === 1 ? '#185FA5' : item.prio === 2 ? '#854F0B' : '#3B6D11';
    const tags = item.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cat = section.cat;
    card.innerHTML = `<div class="card-top"><span class="card-name">${item.name}</span><span class="prio ${prioClass}">${prioLabel}</span></div><div class="card-meta">${tags}<span class="day-badge">${item.day}</span></div><p class="card-desc">${item.desc}</p><div class="progress-bar"><div class="progress-fill" style="width:0%;background:${progColor}"></div></div>`;
    card.onclick = () => toggleCard(card);
    grid.appendChild(card);
  });
});
</script>
