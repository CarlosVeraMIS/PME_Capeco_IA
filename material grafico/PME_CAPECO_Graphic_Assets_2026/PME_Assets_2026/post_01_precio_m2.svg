<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pp_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060F1E"/>
      <stop offset="100%" stop-color="#1B3A5C"/>
    </linearGradient>
    <linearGradient id="pp_acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8500D"/>
      <stop offset="60%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <pattern id="grid_p" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="white" stroke-width="0.8" opacity="0.035"/>
    </pattern>
  </defs>
  <rect width="1080" height="1080" fill="url(#pp_bg)"/>
  <rect width="1080" height="1080" fill="url(#grid_p)"/>
  <!-- Accent circles decoration -->
  <circle cx="1080" cy="0" r="400" fill="none" stroke="white" stroke-width="1" opacity="0.025"/>
  <circle cx="1080" cy="0" r="250" fill="none" stroke="white" stroke-width="1" opacity="0.03"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1080" height="6" fill="url(#pp_acc)"/>
  <!-- Logo top left -->
  <rect x="60" y="60" width="70" height="70" rx="11" fill="#E8500D"/>
  <text x="95" y="104" font-family="'DM Sans', 'Arial Black', sans-serif"
        font-size="22" font-weight="900" fill="white" text-anchor="middle">PME</text>
  <text x="148" y="88" font-family="'DM Sans', Arial, sans-serif"
        font-size="18" font-weight="700" fill="rgba(255,255,255,0.7)" letter-spacing="0.5">PME CAPECO</text>
  <text x="148" y="110" font-family="'DM Sans', Arial, sans-serif"
        font-size="12" font-weight="500" fill="rgba(255,255,255,0.35)" letter-spacing="1">INTELIGENCIA DE MERCADO</text>
  <!-- Tag pill -->
  <rect x="60" y="220" width="260" height="44" rx="22" 
        fill="rgba(232,80,13,0.15)" stroke="rgba(232,80,13,0.3)" stroke-width="1.5"/>
  <text x="190" y="248" font-family="'DM Sans', Arial, sans-serif"
        font-size="14" font-weight="800" fill="#E8500D" text-anchor="middle" letter-spacing="1.5">EL DATO DE LA SEMANA</text>
  <!-- Label -->
  <text x="60" y="340" font-family="'DM Sans', Arial, sans-serif"
        font-size="20" font-weight="600" fill="rgba(255,255,255,0.4)" letter-spacing="2">PRECIO PROMEDIO M² · LIMA</text>
  <!-- Main number -->
  <text x="60" y="530" font-family="Georgia, 'Times New Roman', serif"
        font-size="168" font-weight="400" fill="white" letter-spacing="-4">S/ 6,240</text>
  <!-- Unit -->
  <text x="64" y="600" font-family="'DM Sans', Arial, sans-serif"
        font-size="22" font-weight="500" fill="rgba(255,255,255,0.45)" letter-spacing="1">POR METRO CUADRADO · Q4 2025</text>
  <!-- Trend badge -->
  <rect x="60" y="650" width="160" height="48" rx="8" fill="rgba(13,148,136,0.2)" 
        stroke="rgba(13,148,136,0.35)" stroke-width="1.5"/>
  <text x="140" y="681" font-family="'DM Sans', Arial, sans-serif"
        font-size="20" font-weight="800" fill="#5EEAD4" text-anchor="middle">↑ +9.3%</text>
  <!-- Separator -->
  <rect x="60" y="740" width="600" height="1.5" fill="rgba(255,255,255,0.08)"/>
  <!-- District data -->
  <text x="60" y="790" font-family="'DM Sans', Arial, sans-serif"
        font-size="16" font-weight="600" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">TOP DISTRITOS</text>
  <!-- Miraflores -->
  <text x="60" y="840" font-family="'DM Sans', Arial, sans-serif"
        font-size="22" font-weight="500" fill="rgba(255,255,255,0.7)">Miraflores</text>
  <text x="60" y="866" font-family="Georgia, serif"
        font-size="32" font-weight="400" fill="white">S/ 9,850<tspan font-family="'DM Sans',Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" font-weight="500">/m²</tspan></text>
  <!-- San Isidro -->
  <text x="360" y="840" font-family="'DM Sans', Arial, sans-serif"
        font-size="22" font-weight="500" fill="rgba(255,255,255,0.7)">San Isidro</text>
  <text x="360" y="866" font-family="Georgia, serif"
        font-size="32" font-weight="400" fill="white">S/ 9,420<tspan font-family="'DM Sans',Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" font-weight="500">/m²</tspan></text>
  <!-- Surquillo -->
  <text x="660" y="840" font-family="'DM Sans', Arial, sans-serif"
        font-size="22" font-weight="500" fill="rgba(255,255,255,0.7)">Surquillo</text>
  <text x="660" y="866" font-family="Georgia, serif"
        font-size="32" font-weight="400" fill="white">S/ 6,890<tspan font-family="'DM Sans',Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" font-weight="500">/m²</tspan></text>
  <!-- Bottom source -->
  <text x="1020" y="1040" font-family="'DM Sans', Arial, sans-serif"
        font-size="13" font-weight="500" fill="rgba(255,255,255,0.2)" text-anchor="end" font-style="italic">Fuente: CAPECO PME · Dato censal · pme.pe</text>
  <!-- Bottom accent -->
  <rect x="0" y="1074" width="1080" height="6" fill="url(#pp_acc)"/>
</svg>