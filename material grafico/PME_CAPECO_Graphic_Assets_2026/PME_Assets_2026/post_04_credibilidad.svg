<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cred_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060F1E"/>
      <stop offset="60%" stop-color="#0F2340"/>
      <stop offset="100%" stop-color="#243F63"/>
    </linearGradient>
    <linearGradient id="orange_fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8500D"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#cred_bg)"/>
  <!-- Geometric background circles -->
  <circle cx="540" cy="520" r="420" fill="none" stroke="white" stroke-width="1" opacity="0.025"/>
  <circle cx="540" cy="520" r="300" fill="none" stroke="white" stroke-width="1" opacity="0.03"/>
  <circle cx="540" cy="520" r="180" fill="none" stroke="#E8500D" stroke-width="1" opacity="0.08"/>
  <!-- Logo top -->
  <rect x="60" y="60" width="64" height="64" rx="10" fill="#E8500D"/>
  <text x="92" y="100" font-family="'DM Sans', 'Arial Black', sans-serif"
        font-size="20" font-weight="900" fill="white" text-anchor="middle">PME</text>
  <text x="142" y="82" font-family="'DM Sans', Arial, sans-serif"
        font-size="16" font-weight="700" fill="rgba(255,255,255,0.65)">PME CAPECO</text>
  <text x="142" y="103" font-family="'DM Sans', Arial, sans-serif"
        font-size="11" font-weight="500" fill="rgba(255,255,255,0.3)" letter-spacing="1">INTELIGENCIA INMOBILIARIA</text>
  <!-- Center big number -->
  <text x="540" y="560" font-family="Georgia, 'Times New Roman', serif"
        font-size="320" font-weight="400" fill="white" text-anchor="middle" 
        opacity="0.95" letter-spacing="-10">63</text>
  <!-- Label under number -->
  <text x="540" y="640" font-family="'DM Sans', Arial, sans-serif"
        font-size="22" font-weight="700" fill="rgba(255,255,255,0.45)" 
        text-anchor="middle" letter-spacing="4">AÑOS DE TRAYECTORIA</text>
  <!-- Orange divider line -->
  <rect x="340" y="668" width="400" height="3" fill="url(#orange_fade)" rx="1.5"/>
  <!-- Subtitle -->
  <text x="540" y="740" font-family="Georgia, serif"
        font-size="38" font-weight="400" fill="rgba(255,255,255,0.7)" 
        text-anchor="middle" font-style="italic">Censo · No muestra</text>
  <!-- Stats row -->
  <text x="220" y="860" font-family="Georgia, serif"
        font-size="52" fill="white" text-anchor="middle">200<tspan font-family="'DM Sans',Arial,sans-serif" font-size="22" font-weight="700" fill="#E8500D">+</tspan></text>
  <text x="220" y="895" font-family="'DM Sans', Arial, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">EMPRESAS</text>
  <rect x="320" y="820" width="1" height="80" fill="rgba(255,255,255,0.08)"/>
  <text x="540" y="860" font-family="Georgia, serif"
        font-size="52" fill="white" text-anchor="middle">26</text>
  <text x="540" y="895" font-family="'DM Sans', Arial, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">DISTRITOS LIMA</text>
  <rect x="760" y="820" width="1" height="80" fill="rgba(255,255,255,0.08)"/>
  <text x="870" y="860" font-family="Georgia, serif"
        font-size="52" fill="white" text-anchor="middle">100<tspan font-family="'DM Sans',Arial,sans-serif" font-size="22" font-weight="700" fill="#E8500D">%</tspan></text>
  <text x="870" y="895" font-family="'DM Sans', Arial, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1">CENSAL</text>
  <!-- URL -->
  <text x="540" y="1000" font-family="'DM Sans', Arial, sans-serif"
        font-size="20" font-weight="600" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">www.pme.pe</text>
</svg>